<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nard Home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* BODY */
body{
    background:url("img/Gemini_Generated_Image_u88131u88131u881.png") center/cover no-repeat fixed;
    color:#fff;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

body.dark::before{
    background:rgba(0,0,0,0.75);
}

/* HEADER */
.header{
    height:170px;
    position:relative;
    overflow:hidden;
}

/* 🔥 HEADER IMAGE BACK */
.header-img{
    position:absolute;
    inset:0;
}

.header-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.9);
}

/* TOP ICONS */
.top-icons{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    gap:10px;
    z-index:5;
}

/* BUTTONS */
.lang-btn, .theme-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.lang-btn img{
    width:100%;
    border-radius:50%;
}

.theme-btn{
    background:rgba(0,0,0,0.5);
}

.theme-btn i{
    color:#fff;
}

/* SEARCH */
.search-box{
    padding:15px;
}

.search-box input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
}

/* PRODUCTS */
.container{
    padding:15px;
}

.product{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(255,255,255,0.1);
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
}

.product img{
    width:55px;
    height:55px;
    border-radius:10px;
}

.name{
    flex:1;
    text-align:center;
    font-weight:bold;
}

.price{
    color:#ffd700;
}

.btn{
    background:#ffd700;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* CART */
.cart-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#ffd700;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    width:22px;
    height:22px;
    border-radius:50%;
    font-size:12px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    color:#000;
    padding:20px;
    width:90%;
    border-radius:12px;
}
</style>
</head>

<body>

<!-- HEADER WITH IMAGE (RESTORED) -->
<div class="header">

    <div class="header-img">
        <img src="img/Gemini_Generated_Image_u88131u88131u881.png">
    </div>

    <div class="top-icons">

        <div class="theme-btn" onclick="toggleTheme()">
            <i id="themeIcon" class="fas fa-moon"></i>
        </div>

        <div class="lang-btn">
            <img src="img/azerbaycan.jpg">
        </div>

    </div>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="search" placeholder="Məhsul axtar...">
</div>

<!-- PRODUCTS -->
<div class="container" id="productList"></div>

<!-- CART -->
<div class="cart-float" onclick="openCart()">
    <i class="fas fa-shopping-cart"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2>Səbət</h2>
        <div id="cartItems"></div>
        <h3 id="totalPrice"></h3>

        <a id="whatsappBtn" target="_blank">
            <button style="margin-top:10px;background:green;color:#fff;padding:10px;border:none;border-radius:8px;">
                WhatsApp ilə sifariş et
            </button>
        </a>

        <button onclick="closeCart()" style="margin-top:10px;background:red;color:#fff;padding:8px;border:none;border-radius:8px;">
            Bağla
        </button>
    </div>
</div>

<script>

let cart=[];
let total=0;

/* PRODUCTS */
let products=[];
for(let i=1;i<=50;i++){
    products.push({
        name:"Nərd Model "+i,
        price:Math.floor(Math.random()*200+50)
    });
}

/* RENDER */
function render(){
    let box=document.getElementById("productList");
    box.innerHTML="";

    products.forEach((p,i)=>{
        box.innerHTML+=`
        <div class="product">
            <img src="https://via.placeholder.com/55">
            <div class="name">${p.name}</div>
            <div class="price">${p.price}₼</div>
            <button class="btn" onclick="addCart(${i})">Səbət</button>
        </div>
        `;
    });
}
render();

/* CART */
function addCart(i){
    cart.push(products[i]);
    document.getElementById("cartCount").innerText=cart.length;
}

/* OPEN CART */
function openCart(){
    let html="";
    total=0;

    cart.forEach(item=>{
        html+=`<p>${item.name} - ${item.price}₼</p>`;
        total+=item.price;
    });

    document.getElementById("cartItems").innerHTML=html;
    document.getElementById("totalPrice").innerText="Ümumi: "+total+"₼";

    let msg=cart.map(i=>`${i.name} - ${i.price}₼`).join("%0A");

    document.getElementById("whatsappBtn").href=
    "https://wa.me/994000000000?text=Sifariş:%0A"+msg+"%0AÜmumi:"+total+"₼";

    document.getElementById("popup").style.display="flex";
}

function closeCart(){
    document.getElementById("popup").style.display="none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
    let val=this.value.toLowerCase();
    document.querySelectorAll(".product").forEach(p=>{
        let name=p.querySelector(".name").innerText.toLowerCase();
        p.style.display=name.includes(val)?"flex":"none";
    });
});

/* DARK MODE ICON FIX */
function toggleTheme(){
    document.body.classList.toggle("dark");

    let icon=document.getElementById("themeIcon");

    if(document.body.classList.contains("dark")){
        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
    }else{
        icon.classList.remove("fa-sun");
        icon.classList.add("fa-moon");
    }
}

</script>

</body>
</html>
