<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nerd_home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

/* BODY */
body{
    transition:.4s;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("img/WhatsApp Image 2026-04-15 at 22.40.59.jpeg") center/cover no-repeat;
    z-index:-2;
}

/* OVERLAY */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0);
    transition:.4s;
    z-index:-1;
}

body.dark::after{
    background:rgba(0,0,0,0.55);
}

/* HEADER */
.header{
    height:150px;
    position:relative;
    overflow:hidden;
}

/* DARK MODE BUTTON */
.theme-toggle{
    position:absolute;
    top:15px;
    left:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(0,0,0,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:5;
}

.theme-toggle i{
    color:#fff;
}

/* FLAG */
.lang-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #fff;
    z-index:5;
}

.lang-btn img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* MENU */
.content{
    text-align:center;
    margin-top:40px;
}

.menu-card{
    max-width:360px;
    margin:20px auto;
    padding:18px;
    border-radius:12px;
    font-weight:bold;
    background:#ffcc00;
    color:#000;
}

/* CART BUTTON */
.cart-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    background:#ffd000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    z-index:999;
}

#cartCount{
    position:absolute;
    top:5px;
    right:10px;
    background:red;
    color:#fff;
    font-size:12px;
    padding:2px 6px;
    border-radius:50%;
}

/* CART MODAL */
.cart-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.cart-box{
    background:#fff;
    width:90%;
    max-width:400px;
    padding:15px;
    border-radius:12px;
}

.wa-btn{
    display:block;
    margin-top:10px;
    background:#25D366;
    color:#fff;
    text-align:center;
    padding:10px;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="header">

    <div class="theme-toggle" id="toggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="lang-btn">
        <img src="img/azerbaycan.jpg">
    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="menu-card">🎲 Nərdlər</div>
    <div class="menu-card">♟️ Şahmatlar</div>
    <div class="menu-card">🁢 Dominolar</div>
    <div class="menu-card">📿 Təsbehlər</div>

</div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</div>

<!-- CART -->
<div class="cart-modal" id="cartModal">
    <div class="cart-box">

        <h3>Səbət</h3>

        <div id="cartItems"></div>

        <h3 id="cartTotal"></h3>

        <a id="whatsappBtn" class="wa-btn" target="_blank">
            WhatsApp Sifariş
        </a>

        <button onclick="closeCart()">Bağla</button>

    </div>
</div>

<script>

/* DARK MODE */
document.getElementById("toggle").onclick=()=>{
    document.body.classList.toggle("dark");
}

/* GLOBAL CART (LOCALSTORAGE) */
function getCart(){
    return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart){
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCart();
}

/* başqa səhifədən əlavə ediləcək */
function addToCart(name,price,qty){
    let cart=getCart();
    cart.push({name,price,qty});
    saveCart(cart);
}

function updateCart(){
    let cart=getCart();

    document.getElementById("cartCount").innerText=cart.length;

    let box=document.getElementById("cartItems");
    let total=0;
    box.innerHTML="";

    cart.forEach(i=>{
        let sum=i.price*i.qty;
        total+=sum;

        box.innerHTML+=`
        <div style="display:flex;justify-content:space-between;margin:5px 0">
            <span>${i.name} x${i.qty}</span>
            <span>${sum}₼</span>
        </div>`;
    });

    document.getElementById("cartTotal").innerText="Cəmi: "+total+"₼";

    let text="Sifariş:%0A";
    cart.forEach(i=>{
        text+=`${i.name} x${i.qty}%0A`;
    });

    document.getElementById("whatsappBtn").href=
    "https://wa.me/994501234567?text="+text;
}

function openCart(){
    document.getElementById("cartModal").style.display="flex";
}

function closeCart(){
    document.getElementById("cartModal").style.display="none";
}

updateCart();

</script>

</body>
</html>
