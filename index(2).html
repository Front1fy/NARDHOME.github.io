<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nard Home - 50 Məhsul</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

/* ================= BODY ================= */
body{
    background:url("img/Gemini_Generated_Image_u88131u88131u881.png") center/cover no-repeat fixed;
    color:#fff;
    transition:.4s;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
    transition:.4s;
}

/* DARK MODE */
body.dark::before{
    background:rgba(0,0,0,0.75);
}

/* ================= HEADER ================= */
.header{
    height:170px;
    position:relative;
    overflow:hidden;
    border-bottom-left-radius:60px;
    border-bottom-right-radius:60px;
}

.header-img{
    position:absolute;
    inset:0;
}

.header-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.header::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}

/* ================= TOP BUTTONS ================= */
.top-icons{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    gap:10px;
    z-index:10;
}

/* FLAG */
.lang-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #fff;
    cursor:pointer;
}

.lang-btn img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* DARK MODE BUTTON */
.theme-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.theme-btn i{
    color:#fff;
}

/* ================= SEARCH ================= */
.search-box{
    padding:15px;
}

.search-box input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    outline:none;
}

/* ================= PRODUCTS ================= */
.container{
    padding:15px;
}

.product{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(255,255,255,0.1);
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
}

.product img{
    width:55px;
    height:55px;
    border-radius:10px;
}

.name{
    flex:1;
    text-align:center;
    font-weight:bold;
}

.price{
    color:#ffd700;
    font-weight:bold;
}

.btn{
    background:#ffd700;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* ================= FLOATING CART ================= */
.cart-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#ffd700;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 0 15px rgba(255,215,0,0.6);
    z-index:999;
}

.cart-float i{
    font-size:24px;
    color:#000;
}

/* BADGE */
.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:#fff;
    width:22px;
    height:22px;
    border-radius:50%;
    font-size:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    color:#000;
    padding:20px;
    width:85%;
    border-radius:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-img">
        <img src="img/Gemini_Generated_Image_u88131u88131u881.png">
    </div>

    <!-- TOP ICONS -->
    <div class="top-icons">

        <!-- DARK MODE -->
        <div class="theme-btn" onclick="toggleTheme()">
            <i class="fas fa-moon" id="moon"></i>
        </div>

        <!-- FLAG -->
        <div class="lang-btn">
            <img src="img/azerbaycan.jpg">
        </div>

    </div>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" id="search" placeholder="Məhsul axtar...">
</div>

<!-- PRODUCTS -->
<div class="container" id="productList"></div>

<!-- CART -->
<div class="cart-float" onclick="openCart()">
    <i class="fas fa-shopping-cart"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h2 id="pname"></h2>
        <p id="pdesc"></p>
        <button onclick="closeInfo()">Bağla</button>
    </div>
</div>

<script>

let cart=0;

/* PRODUCTS 50 */
let products=[];
for(let i=1;i<=50;i++){
    products.push({
        name:"Nərd Model "+i,
        price:Math.floor(Math.random()*200+50)
    });
}

/* RENDER */
function render(){
    let box=document.getElementById("productList");
    box.innerHTML="";

    products.forEach(p=>{
        box.innerHTML+=`
        <div class="product" onclick="showInfo('${p.name}','Nərd haqqında məlumat')">
            <img src="https://via.placeholder.com/55">
            <div class="name">${p.name}</div>
            <div class="price">${p.price}₼</div>
            <button class="btn" onclick="addCart(event)">Səbət</button>
        </div>
        `;
    });
}
render();

/* CART */
function addCart(e){
    e.stopPropagation();
    cart++;
    document.getElementById("cartCount").innerText=cart;
}

function openCart(){
    alert("Səbətdə: "+cart+" məhsul var");
}

/* POPUP */
function showInfo(name,desc){
    document.getElementById("pname").innerText=name;
    document.getElementById("pdesc").innerText=desc;
    document.getElementById("popup").style.display="flex";
}

function closeInfo(){
    document.getElementById("popup").style.display="none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
    let val=this.value.toLowerCase();
    document.querySelectorAll(".product").forEach(p=>{
        let name=p.querySelector(".name").innerText.toLowerCase();
        p.style.display=name.includes(val)?"flex":"none";
    });
});

/* DARK MODE */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
