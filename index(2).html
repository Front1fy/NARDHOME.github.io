<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nard Home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:url("img/Gemini_Generated_Image_u88131u88131u881.png") center/cover no-repeat fixed;
    color:#fff;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}

/* HEADER */
.header{height:170px;position:relative;overflow:hidden;border-bottom-left-radius:60px;border-bottom-right-radius:60px;}

.header-img img{width:100%;height:100%;object-fit:cover;}

.top-icons{position:absolute;top:15px;right:15px;display:flex;gap:10px;}

.theme-btn,.lang-btn{width:40px;height:40px;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;}

.theme-btn{background:rgba(0,0,0,0.5);}
.theme-btn i{color:#fff;}

.lang-btn img{width:100%;border-radius:50%;}

/* SEARCH */
.search-box{padding:15px;}
.search-box input{width:100%;padding:14px;border-radius:12px;border:none;}

/* PRODUCTS */
.container{padding:15px;}

.product{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(255,255,255,0.1);
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    cursor:pointer;
}

.product img{width:55px;height:55px;border-radius:10px;}

.name{flex:1;text-align:center;font-weight:bold;}
.price{color:#ffd700;}

.btn{background:#ffd700;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;}

/* CART */
.cart-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#ffd700;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.cart-count{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    width:22px;
    height:22px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:12px;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    color:#000;
    padding:20px;
    width:90%;
    border-radius:12px;
}

/* CART ITEM */
.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
}

.qty{
    display:flex;
    gap:8px;
    align-items:center;
}

.qty button{
    width:25px;
    height:25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#ffd700;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-img">
        <img src="img/Gemini_Generated_Image_u88131u88131u881.png">
    </div>

    <div class="top-icons">
        <div class="theme-btn" onclick="toggleTheme()">
            <i id="icon" class="fas fa-moon"></i>
        </div>

        <div class="lang-btn">
            <img src="img/azerbaycan.jpg">
        </div>
    </div>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Məhsul axtar...">
</div>

<div class="container" id="productList"></div>

<div class="cart-float" onclick="openCart()">
    <i class="fas fa-shopping-cart"></i>
    <div class="cart-count" id="cartCount">0</div>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <h2>Səbət</h2>
        <div id="cartItems"></div>
        <h3 id="totalPrice"></h3>
        <button onclick="closeCart()" style="margin-top:10px;background:red;color:#fff;padding:8px;border:none;border-radius:8px;">Bağla</button>
    </div>
</div>

<!-- INFO -->
<div class="popup" id="infoPopup">
    <div class="popup-box">
        <h2 id="infoName"></h2>
        <p>Nərd premium keyfiyyətli əl işidir.</p>
        <button onclick="closeInfo()" style="margin-top:10px;background:red;color:#fff;padding:8px;border:none;border-radius:8px;">Bağla</button>
    </div>
</div>

<script>

let cart={};
let products=[];

for(let i=1;i<=50;i++){
    products.push({
        id:i,
        name:"Nərd Model "+i,
        price:Math.floor(Math.random()*200+50)
    });
}

/* RENDER */
function render(){
    let box=document.getElementById("productList");
    box.innerHTML="";

    products.forEach(p=>{
        box.innerHTML+=`
        <div class="product" onclick="showInfo('${p.name}')">
            <img src="https://via.placeholder.com/55">
            <div class="name">${p.name}</div>
            <div class="price">${p.price}₼</div>
            <button class="btn" onclick="add(event,${p.id})">Səbət</button>
        </div>
        `;
    });
}
render();

/* ADD CART */
function add(e,id){
    e.stopPropagation();

    if(!cart[id]){
        let p=products.find(x=>x.id===id);
        cart[id]={...p,qty:1};
    }else{
        cart[id].qty++;
    }

    updateCartCount();
}

/* COUNT */
function updateCartCount(){
    let count=0;
    Object.values(cart).forEach(i=>count+=i.qty);
    document.getElementById("cartCount").innerText=count;
}

/* OPEN CART */
function openCart(){
    let html="";
    let total=0;

    Object.values(cart).forEach(item=>{
        total+=item.price*item.qty;

        html+=`
        <div class="cart-item">
            <div>${item.name}</div>

            <div class="qty">
                <button onclick="minus(${item.id})">-</button>
                <span>${item.qty}</span>
                <button onclick="plus(${item.id})">+</button>
            </div>

            <div>${item.price*item.qty}₼</div>
        </div>
        `;
    });

    document.getElementById("cartItems").innerHTML=html;
    document.getElementById("totalPrice").innerText="Ümumi: "+total+"₼";

    document.getElementById("popup").style.display="flex";
}

/* + - */
function plus(id){cart[id].qty++;openCart();updateCartCount();}
function minus(id){
    cart[id].qty--;
    if(cart[id].qty<=0) delete cart[id];
    openCart();updateCartCount();
}

/* INFO */
function showInfo(name){
    document.getElementById("infoName").innerText=name;
    document.getElementById("infoPopup").style.display="flex";
}
function closeInfo(){
    document.getElementById("infoPopup").style.display="none";
}

function closeCart(){
    document.getElementById("popup").style.display="none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
    let v=this.value.toLowerCase();
    document.querySelectorAll(".product").forEach(p=>{
        let n=p.querySelector(".name").innerText.toLowerCase();
        p.style.display=n.includes(v)?"flex":"none";
    });
});

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
    let icon=document.getElementById("icon");
    icon.classList.toggle("fa-moon");
    icon.classList.toggle("fa-sun");
}

</script>

</body>
</html>
