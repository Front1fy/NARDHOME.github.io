<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nerd_home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

/* BODY */
body{
    transition:.4s;
    position:relative;
    overflow-x:hidden;
}

/* SABIT ARXA PLAN */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("img/Gemini_Generated_Image_w9ny57w9ny57w9ny.jpg") center/cover no-repeat;
    z-index:-2;
}

/* GECE / GÜNDÜZ DARK EFFECT */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0);
    transition:.4s;
    z-index:-1;
    pointer-events:none;
}

body.dark::after{
    background:rgba(0,0,0,0.55);
}

/* HEADER */
.header{
    height:150px;
    position:relative;
    border-bottom-left-radius:60% 35px;
    border-bottom-right-radius:70% 35px;
    background:rgba(255,204,0,0.95);
}

/* THEME BUTTON */
.theme-toggle{
    position:absolute;
    top:15px;
    left:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    background:rgba(0,0,0,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.theme-toggle i{
    position:absolute;
    color:#fff;
    font-size:18px;
}

#sun{display:none;}
body.light #sun{display:block;}
body.light #moon{display:none;}
body.dark #moon{display:block;}
body.dark #sun{display:none;}

/* FLAG */
.lang-btn{
    position:absolute;
    top:15px;
    right:15px;
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid #fff;
}

.lang-btn img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LOGO */
.logo{
    width:105px;
    height:105px;
    border-radius:50%;
    position:absolute;
    left:50%;
    top:25px;
    transform:translateX(-50%);
    overflow:hidden;
    border:3px solid #fff;
    background:#fff;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TITLE */
.title{
    text-align:center;
    margin-top:70px;
}

.title h1{
    font-size:30px;
    color:#ffd700;
    text-shadow:0 0 10px #ffcc00, 0 0 25px #ff9900;
}

/* ⭐ ULDUZLAR (BÖYÜK + ANİMASİYA) */
.stars{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.star{
    font-size:60px;
    color:#ffd700;
    text-shadow:
        0 0 10px #ffcc00,
        0 0 25px #ff9900,
        0 0 40px #ffcc00;

    animation:starAnim 1.2s infinite ease-in-out;
}

/* fərqli gecikmə */
.star:nth-child(1){animation-delay:0s;}
.star:nth-child(2){animation-delay:0.1s;}
.star:nth-child(3){animation-delay:0.2s;}
.star:nth-child(4){animation-delay:0.3s;}
.star:nth-child(5){animation-delay:0.4s;}

@keyframes starAnim{
    0%{
        transform:scale(0.7) rotate(-5deg);
        opacity:0.5;
    }
    50%{
        transform:scale(1.3) rotate(5deg);
        opacity:1;
    }
    100%{
        transform:scale(0.9) rotate(0deg);
        opacity:0.8;
    }
}

/* CONTENT */
.content{
    text-align:center;
    padding:15px;
    margin-top:30px;
}

/* MENU CARD */
.menu-card{
    max-width:360px;
    margin:20px auto;
    padding:18px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    cursor:pointer;
    animation:pulse 1.5s infinite;
    background:#ffcc00;
    color:#000;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.05)}
    100%{transform:scale(1)}
}

/* INFO */
.info-box{
    max-width:360px;
    margin:15px auto;
    padding:15px;
    border-radius:12px;
    background:rgba(0,0,0,0.05);
}

/* FOOTER BOX */
.footer-box{
    max-width:380px;
    margin:25px auto;
    padding:18px;
    border-radius:16px;
    border:2px solid #ffd700;
    background:rgba(0,0,0,0.35);
    text-align:center;
}

.footer-box p{
    color:#ffd700;
    font-weight:bold;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:10px;
}

.social-btn{
    font-size:28px;
    margin:0 10px;
    color:#ffd700;
}
</style>
</head>

<body class="dark">

<div class="header">

    <div class="theme-toggle" id="toggle">
        <i class="fas fa-moon" id="moon"></i>
        <i class="fas fa-sun" id="sun"></i>
    </div>

    <div class="lang-btn">
        <img src="img/azerbaycan.jpg">
    </div>

    <div class="logo">
        <img src="img/Ekran görüntüsü 2026-04-12 174558.png">
    </div>

</div>

<div class="title">
    <h1>NARD HOME</h1>

    <!-- ULDUZLAR -->
    <div class="stars">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
    </div>
</div>

<div class="content">

<div class="menu-card">
📖 Məhsullara bax ›
</div>


</div>

<div class="footer-box">
    <p>📍 BAKI</p>
    <p>⏰ AÇILIŞ: 10:00</p>
    <p>⛔ BAĞLANIŞ: 23:00</p>
</div>

<div class="footer">
    <a href="#"><i class="fab fa-instagram social-btn"></i></a>
    <a href="#"><i class="fab fa-whatsapp social-btn"></i></a>
</div>

<script>
const toggle=document.getElementById("toggle");

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
}else{
    document.body.classList.add("light");
}

toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");

    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
};
</script>

</body>
</html>
